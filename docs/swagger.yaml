basePath: /
definitions:
  dto.AchievementResponse:
    properties:
      description:
        type: string
      earned_at:
        type: string
      icon_url:
        type: string
      id:
        type: string
      points:
        type: integer
      title:
        type: string
    type: object
  dto.AssignmentResponse:
    properties:
      course_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      max_score:
        type: integer
      title:
        type: string
    type: object
  dto.AssignmentSubmissionResponse:
    properties:
      assignment_id:
        type: string
      extracted_text:
        type: string
      feedback:
        type: string
      file_url:
        type: string
      graded_at:
        type: string
      id:
        type: string
      score:
        type: integer
      submitted_at:
        type: string
      user_id:
        type: string
      user_name:
        type: string
    type: object
  dto.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.CertificateResponse:
    properties:
      course_id:
        type: string
      file_url:
        type: string
      id:
        type: string
      issued_at:
        type: string
      user_id:
        type: string
    type: object
  dto.CodingAssignmentResponse:
    properties:
      course_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      language:
        type: string
      max_score:
        type: integer
      starter_code:
        type: string
      test_cases:
        description: hidden test cases stripped for students
        items:
          $ref: '#/definitions/dto.TestCase'
        type: array
      title:
        type: string
    type: object
  dto.CodingSubmissionResponse:
    properties:
      code:
        type: string
      coding_assignment_id:
        type: string
      feedback:
        type: string
      graded_at:
        type: string
      id:
        type: string
      passed:
        type: boolean
      score:
        type: integer
      submitted_at:
        type: string
      test_results:
        items:
          $ref: '#/definitions/dto.TestResult'
        type: array
      user_id:
        type: string
      user_name:
        type: string
    type: object
  dto.ConversationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      type:
        type: string
    type: object
  dto.CourseResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration:
        type: string
      format:
        type: string
      id:
        type: string
      is_certificate_available:
        type: boolean
      is_liked:
        type: boolean
      likes_count:
        type: integer
      modules:
        items:
          $ref: '#/definitions/dto.ModuleResponse'
        type: array
      price:
        type: number
      progress:
        type: number
      start_date:
        type: string
      status:
        type: string
      student_count:
        type: integer
      teacher_avatar_url:
        type: string
      teacher_bio:
        type: string
      teacher_id:
        type: string
      teacher_name:
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  dto.CourseReviewResponse:
    properties:
      avatar_url:
        type: string
      comment:
        type: string
      course_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      user_id:
        type: string
      user_name:
        type: string
    type: object
  dto.CourseSearchResponse:
    properties:
      id:
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  dto.CreateAssignmentRequest:
    properties:
      description:
        type: string
      due_date:
        description: Optional ISO8601 string
        type: string
      max_score:
        type: integer
      title:
        type: string
    required:
    - max_score
    - title
    type: object
  dto.CreateCodingAssignmentRequest:
    properties:
      description:
        type: string
      due_date:
        description: ISO 8601 optional
        type: string
      language:
        enum:
        - python
        - javascript
        type: string
      max_score:
        type: integer
      starter_code:
        type: string
      test_cases:
        items:
          $ref: '#/definitions/dto.TestCase'
        type: array
      title:
        type: string
    required:
    - language
    - max_score
    - test_cases
    - title
    type: object
  dto.CreateConversationRequest:
    properties:
      participant_ids:
        items:
          type: string
        minItems: 1
        type: array
      type:
        enum:
        - direct
        - group
        type: string
    required:
    - participant_ids
    - type
    type: object
  dto.CreateCourseRequest:
    properties:
      description:
        type: string
      duration:
        type: string
      format:
        enum:
        - course
        - project
        type: string
      is_certificate_available:
        type: boolean
      price:
        minimum: 0
        type: number
      start_date:
        type: string
      status:
        enum:
        - coming soon
        - active
        - ended
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      type:
        enum:
        - free
        - paid
        type: string
    required:
    - title
    type: object
  dto.CreateCourseReviewRequest:
    properties:
      comment:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - comment
    - rating
    type: object
  dto.CreateModuleRequest:
    properties:
      description:
        type: string
      is_free:
        type: boolean
      parent_id:
        type: string
      points:
        type: integer
      title:
        type: string
      type:
        description: video or chapter
        type: string
      video_url:
        type: string
    required:
    - title
    - type
    type: object
  dto.EnrolmentResponse:
    properties:
      course_id:
        type: string
      course_thumbnail_url:
        type: string
      course_title:
        type: string
      enrolled_at:
        type: string
      progress_percentage:
        type: number
      status:
        type: string
    type: object
  dto.GenerateCertificateRequest:
    properties:
      course_id:
        type: string
      user_id:
        type: string
    required:
    - course_id
    - user_id
    type: object
  dto.GradeCodingSubmissionRequest:
    properties:
      feedback:
        type: string
      score:
        type: integer
    required:
    - score
    type: object
  dto.GradeSubmissionRequest:
    properties:
      feedback:
        type: string
      score:
        type: integer
    required:
    - score
    type: object
  dto.LeaderboardUserResponse:
    properties:
      avatar_url:
        type: string
      enrolled_courses:
        type: integer
      first_name:
        type: string
      last_name:
        type: string
      points:
        type: integer
      user_id:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.MessageResponse:
    properties:
      attachment_url:
        type: string
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: string
    type: object
  dto.ModuleResponse:
    properties:
      course_id:
        type: string
      description:
        type: string
      id:
        type: string
      is_completed:
        type: boolean
      is_free:
        type: boolean
      order_index:
        type: integer
      parent_id:
        type: string
      points:
        type: integer
      title:
        type: string
      type:
        type: string
      video_url:
        type: string
    type: object
  dto.NotificationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      message:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - student
        - teacher
        - admin
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - role
    type: object
  dto.ReorderModulesRequest:
    properties:
      module_ids:
        items:
          type: string
        type: array
    required:
    - module_ids
    type: object
  dto.RunCodeRequest:
    properties:
      code:
        type: string
      input:
        description: arbitrary stdin for quick testing
        type: string
      language:
        enum:
        - python
        - javascript
        type: string
    required:
    - code
    - language
    type: object
  dto.RunCodeResponse:
    properties:
      error:
        type: string
      execution_time_ms:
        type: integer
      output:
        type: string
      stderr:
        type: string
    type: object
  dto.SubmitAssignmentRequest:
    properties:
      file_url:
        type: string
    required:
    - file_url
    type: object
  dto.SubmitCodingRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  dto.TestCase:
    properties:
      description:
        type: string
      expected_output:
        type: string
      id:
        type: string
      input:
        type: string
      is_hidden:
        type: boolean
    type: object
  dto.TestResult:
    properties:
      actual:
        type: string
      description:
        type: string
      error:
        type: string
      execution_time_ms:
        type: integer
      expected:
        description: omitted for hidden cases
        type: string
      input:
        description: omitted for hidden cases
        type: string
      passed:
        type: boolean
      test_case_id:
        type: string
    type: object
  dto.UpdateAssignmentRequest:
    properties:
      description:
        type: string
      due_date:
        type: string
      max_score:
        type: integer
      title:
        type: string
    type: object
  dto.UpdateCodingAssignmentRequest:
    properties:
      description:
        type: string
      due_date:
        type: string
      language:
        type: string
      max_score:
        type: integer
      starter_code:
        type: string
      test_cases:
        items:
          $ref: '#/definitions/dto.TestCase'
        type: array
      title:
        type: string
    type: object
  dto.UpdateCourseRequest:
    properties:
      description:
        type: string
      duration:
        type: string
      format:
        enum:
        - course
        - project
        type: string
      is_certificate_available:
        type: boolean
      price:
        minimum: 0
        type: number
      start_date:
        type: string
      status:
        enum:
        - coming soon
        - active
        - ended
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      type:
        enum:
        - free
        - paid
        type: string
    type: object
  dto.UpdateModuleRequest:
    properties:
      description:
        type: string
      is_free:
        type: boolean
      parent_id:
        type: string
      points:
        type: integer
      title:
        type: string
      video_url:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      first_name:
        type: string
      last_name:
        type: string
    type: object
  dto.UploadResponse:
    properties:
      file_url:
        type: string
    type: object
  dto.UserProfileEnrolmentsResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/dto.AchievementResponse'
        type: array
      enrolments:
        items:
          $ref: '#/definitions/dto.EnrolmentResponse'
        type: array
      points:
        type: integer
      total_enrolments:
        description: if supporting pagination on enrolments
        type: integer
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.UserResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@gceklms.example.com
    name: GCEK LMS Support
  description: Learning Management System backend API for GCEK.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: GCEK LMS API
  version: "1.0"
paths:
  /api/certificates/download:
    get:
      description: Downloads a certificate PDF file by filename.
      parameters:
      - description: Certificate filename (e.g. cert-uuid.pdf)
        in: query
        name: file
        required: true
        type: string
      - description: Course name used in the download filename
        in: query
        name: name
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download a certificate
      tags:
      - certificates
  /api/certificates/generate:
    post:
      consumes:
      - application/json
      description: Generates a PDF certificate for a user who completed a course.
      parameters:
      - description: Certificate generation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GenerateCertificateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CertificateResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate a certificate
      tags:
      - certificates
  /api/chat/conversations:
    get:
      description: Returns all conversations for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ConversationResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get conversations
      tags:
      - chat
    post:
      consumes:
      - application/json
      description: Creates a new direct or group conversation.
      parameters:
      - description: Conversation creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateConversationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a conversation
      tags:
      - chat
  /api/chat/conversations/{id}/messages:
    get:
      description: Returns all messages in a specific conversation.
      parameters:
      - description: Conversation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.MessageResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get conversation messages
      tags:
      - chat
  /api/code/run:
    post:
      consumes:
      - application/json
      description: Executes code in a sandboxed environment without submitting it
        as an assignment.
      parameters:
      - description: Code execution payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RunCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RunCodeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Run code in sandbox
      tags:
      - coding-assignments
  /api/courses:
    get:
      description: Returns a list of courses with optional filters.
      parameters:
      - description: Search query
        in: query
        name: query
        type: string
      - description: Course type (free, paid)
        in: query
        name: type
        type: string
      - description: Course format (course, project)
        in: query
        name: format
        type: string
      - description: Course status (coming soon, active, ended)
        in: query
        name: status
        type: string
      - description: Filter by teacher ID (UUID)
        in: query
        name: teacher_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CourseResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all courses
      tags:
      - courses
    post:
      consumes:
      - application/json
      description: Creates a new course. Requires Teacher or Admin role.
      parameters:
      - description: Course creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a course
      tags:
      - courses
  /api/courses/{id}:
    delete:
      description: Deletes a course. Requires Teacher or Admin role.
      parameters:
      - description: Course ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a course
      tags:
      - courses
    get:
      description: Returns detailed information about a specific course, including
        modules.
      parameters:
      - description: Course ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get course by ID
      tags:
      - courses
    put:
      consumes:
      - application/json
      description: Updates an existing course. Requires Teacher or Admin role.
      parameters:
      - description: Course ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Course update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a course
      tags:
      - courses
  /api/courses/{id}/assignments:
    get:
      description: Returns all assignments for a course.
      parameters:
      - description: Course ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AssignmentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List assignments
      tags:
      - assignments
    post:
      consumes:
      - application/json
      description: Creates a new assignment for a course. Requires Teacher or Admin
        role.
      parameters:
      - description: Course ID (UUID)
        in: path
